app-id: io.github.shreyam1008.GoBarryGo

runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: gobarrygo

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Downloads need full network access
  - --share=network
  # Downloads folder
  - --filesystem=xdg-download
  # User can choose custom download paths
  - --filesystem=home
  # Run aria2c on the host (see note below)
  - --talk-name=org.freedesktop.Flatpak
  # GTK theming
  - --env=GTK_THEME=Adwaita

modules:
  - name: webkit2gtk
    # GoBarryGo uses Wails v3 which embeds a WebView2/WebKitGTK frontend.
    # The freedesktop runtime does not ship webkit2gtk; add it as a module
    # or switch to the GNOME runtime which includes it.
    # Easiest: use runtime org.gnome.Platform instead and remove this module.
    # Keeping this as a placeholder — replace with the GNOME runtime approach.
    buildsystem: simple
    build-commands:
      - echo "Use org.gnome.Platform runtime to get WebKitGTK. See NOTE below."
    sources: []

  - name: gobarrygo
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOPATH: /run/build/gobarrygo/gopath
        GOCACHE: /run/build/gobarrygo/gocache
        CGO_ENABLED: "1"
    build-commands:
      # Wails v3 requires building frontend first (bun/npm), then go build.
      # Adjust the build command to match your Taskfile target.
      - go build -tags production -trimpath -ldflags="-s -w" -o gobarrygo .
      - install -Dm755 gobarrygo /app/bin/gobarrygo
      # Desktop file
      - install -Dm644 build/linux/desktop /app/share/applications/io.github.shreyam1008.GoBarryGo.desktop
      # Icon
      - install -Dm644 build/appicon.png /app/share/icons/hicolor/512x512/apps/io.github.shreyam1008.GoBarryGo.png
      # AppStream
      - install -Dm644 build/linux/io.github.shreyam1008.GoBarryGo.metainfo.xml /app/share/metainfo/io.github.shreyam1008.GoBarryGo.metainfo.xml
    sources:
      - type: git
        url: https://github.com/shreyam1008/gobarrygo.git
        tag: v0.0.7
        commit: placeholder-replace-with-actual-commit-sha
      # Go module mirror sources generated by:
      #   python3 flatpak-go-vendor.py go.sum > go-vendor-sources.json
      # Tool: https://github.com/flatpak/flatpak-builder-tools/tree/master/go-vendor
      - go-vendor-sources.json

# NOTE FOR FLATHUB SUBMISSION:
#
# 1. GoBarryGo uses Wails v3 which requires WebKitGTK.
#    Switch to runtime: org.gnome.Platform (includes WebKitGTK) and
#    remove the webkit2gtk stub module above.
#
# 2. GoBarryGo controls aria2c via JSON-RPC. aria2c runs as a subprocess.
#    Under Flatpak strict sandbox, host binaries are not reachable.
#    Options:
#      a) Bundle aria2c as a static binary inside the snap/flatpak.
#         Source it from a trusted upstream release.
#      b) Use --talk-name=org.freedesktop.Flatpak + flatpak-spawn --host aria2c ...
#         to call host aria2c from inside the sandbox.
#    Option (b) is simpler. Wrap the aria2c launch call with flatpak-spawn --host.
#
# 3. Replace placeholder commit SHA with actual tag SHA.
#
# 4. Generate go-vendor-sources.json for offline Go module fetching.
#
# 5. Update the desktop file app-id to io.github.shreyam1008.GoBarryGo.
