version: '3'

info:
  companyName: "Shreyam1008"
  productName: "GoBarryGo"
  productIdentifier: "io.shreyam.gobarrygo"
  description: "A lightweight desktop download manager powered by aria2c."
  copyright: "(c) 2026, Shreyam1008"
  comments: "Version 0.0.6 CHITRA"
  version: "0.0.6"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 800
  ignore:
    dir:
      - .git
      - bin
      - frontend
    file:
      - .DS_Store
      - .gitignore
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

other:
  - name: CHITRA

