name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.0"
  BUN_VERSION: "1.3.10"
  WAILS_VERSION: "v3.0.0-alpha.74"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: ${{ runner.os }}-wails3-${{ env.WAILS_VERSION }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}

      - name: Add Wails to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate build assets
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.gitkeep
          wails3 generate bindings -clean=true -ts

      - name: Cache frontend node_modules
        id: cache-frontend-modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/bun.lock', 'frontend/package.json') }}

      - name: Install frontend dependencies
        if: steps.cache-frontend-modules.outputs.cache-hit != 'true'
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend checks
        working-directory: frontend
        run: |
          bun run typecheck
          bun run test
          bun run build

      - name: Go tests
        run: go test ./internal/app ./internal/aria2 ./internal/config ./internal/contracts ./internal/system ./internal/version ./tests/...

      - name: Linux smoke build
        run: go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/gobarrygo .

