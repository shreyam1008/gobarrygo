name: build-main

on:
  push:
    branches: [main]

env:
  GO_VERSION: "1.26.0"
  BUN_VERSION: "1.3.10"
  WAILS_VERSION: "v3.0.0-alpha.74"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Linux GUI dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Install NSIS
        if: matrix.target == 'windows'
        run: choco install nsis -y
        shell: powershell

      - name: Cache Wails CLI
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: ${{ runner.os }}-wails3-${{ env.WAILS_VERSION }}

      - name: Install Wails CLI
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${WAILS_VERSION}
        shell: bash

      - name: Add Wails to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Prepare generated assets
        run: |
          go run ./tools/generate_appicon.go
          wails3 generate icons -input build/appicon.png -macfilename build/darwin/icons.icns -windowsfilename build/windows/icon.ico
          mkdir -p frontend/dist
          touch frontend/dist/.gitkeep
          wails3 generate bindings -clean=true -ts
        shell: bash

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build Linux artifacts
        if: matrix.target == 'linux'
        run: |
          bun --cwd frontend run build
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/gobarrygo .
          wails3 generate .desktop -name "gobarrygo" -exec "gobarrygo" -icon "gobarrygo" -outputfile build/linux/gobarrygo.desktop -categories "Network;Utility;"
          wails3 generate appimage -binary bin/gobarrygo -icon build/appicon.png -desktopfile build/linux/gobarrygo.desktop -outputdir bin -builddir build/linux/appimage
          wails3 tool package -name "gobarrygo" -format deb -config build/linux/nfpm/nfpm.yaml -out bin
          wails3 tool package -name "gobarrygo" -format rpm -config build/linux/nfpm/nfpm.yaml -out bin
        shell: bash

      - name: Build Windows artifacts
        if: matrix.target == 'windows'
        run: |
          bun --cwd frontend run build
          wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          $env:CGO_ENABLED="0"
          go build -tags production -trimpath -buildvcs=false -ldflags='-w -s -H windowsgui' -o bin/gobarrygo.exe .
          Remove-Item wails_windows_amd64.syso
          wails3 generate webview2bootstrapper -dir "$PWD/build/windows/nsis"
          & "C:\Program Files (x86)\NSIS\makensis.exe" -DARG_WAILS_AMD64_BINARY="$PWD\bin\gobarrygo.exe" "$PWD\build\windows\nsis\project.nsi"
        shell: powershell

      - name: Build macOS artifacts
        if: matrix.target == 'macos'
        run: |
          bun --cwd frontend run build
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/gobarrygo .
          mkdir -p bin/gobarrygo.app/Contents/MacOS
          mkdir -p bin/gobarrygo.app/Contents/Resources
          cp build/darwin/icons.icns bin/gobarrygo.app/Contents/Resources/icons.icns
          cp build/darwin/Info.plist bin/gobarrygo.app/Contents/Info.plist
          cp bin/gobarrygo bin/gobarrygo.app/Contents/MacOS/gobarrygo
          codesign --force --deep --sign - bin/gobarrygo.app
          ditto -c -k --keepParent bin/gobarrygo.app bin/gobarrygo-macos.zip
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: |
            bin/*
            !bin/gobarrygo

